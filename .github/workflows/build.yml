name: Build Kernel Driver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Windows Driver Kit (WDK) via Chocolatey
        shell: powershell
        run: choco install windowsdriverkit -y

      - name: Build driver (Release x64)
        run: msbuild TestDriver.sln /p:Configuration=Release /p:Platform=x64 /v:minimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestDriver
          path: x64\Release\TestDriver.sys
