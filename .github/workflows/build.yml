name: Build Kernel Driver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Windows Driver Kit (WDK)
        shell: powershell
        run: |
          $url = "https://go.microsoft.com/fwlink/?linkid=2166289"
          $installer = "$env:TEMP\wdksetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/quiet /norestart" -Wait

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Locate WDK include and lib folders
        shell: powershell
        run: |
          $wdkRoot = "C:\Program Files (x86)\Windows Kits\10"
          $includeDir = Get-ChildItem "$wdkRoot\Include" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $libDir = Get-ChildItem "$wdkRoot\Lib" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $includeDir -or -not $libDir) {
            Write-Error "Could not find WDK directories"
            exit 1
          }
          "WDK_INCLUDE=$($includeDir.FullName)\km" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WDK_LIB=$($libDir.FullName)\km\x64" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "WDK_INCLUDE=$($includeDir.FullName)\km"
          Write-Host "WDK_LIB=$($libDir.FullName)\km\x64"

      - name: Build driver (Release x64)
        shell: powershell
        run: |
          msbuild TestDriver.sln /p:Configuration=Release /p:Platform=x64 /p:WDK_INCLUDE="$env:WDK_INCLUDE" /p:WDK_LIB="$env:WDK_LIB" /v:minimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestDriver
          path: x64\Release\TestDriver.sys
